<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBank</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- top bar -->
    <header class="container">
      <img src="./assets/icons/hbank-logo.svg" alt="HBank logo" />

      <!-- user profile component -->
      <div class="user-profile">
        <img
          src="./assets/images/user-avatar.png"
          srcset="./assets/images/user-avatar@2x.png 2x"
          alt="User avatar"
          class="user-profile__image"
        />
        <h1 class="size-16 medium">Theo Snyman</h1>
      </div>
    </header>

    <div class="app-layout">
      <!-- side nav -->
      <nav class="container" aria-label="Primary">
        <div class="nav-scroll">
          <section class="nav-section" aria-label="Dashboard">
            <ul class="nav-group">
              <li>
                <!-- nav link component -->
                <a
                  href="#"
                  class="nav-link nav-link--active"
                  aria-label="Dashboard"
                >
                  <img
                    src="./assets/icons/house.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Dashboard</span>
                </a>
              </li>
            </ul>
          </section>

          <section class="nav-section" aria-labelledby="nav-group-analytics">
            <p class="nav-group__label" id="nav-group-analytics">Analytics</p>
            <ul class="nav-group">
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Performance">
                  <img
                    src="./assets/icons/trend-line.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Performance</span>
                </a>
              </li>
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Hotjar">
                  <img
                    src="./assets/icons/target.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Hotjar</span>
                </a>
              </li>
            </ul>
          </section>

          <section class="nav-section" aria-labelledby="nav-group-support">
            <p class="nav-group__label" id="nav-group-support">Support</p>
            <ul class="nav-group">
              <li class="new-link">
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Tickets">
                  <img
                    src="./assets/icons/ticket.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Tickets</span>
                </a>

                <span class="badge badge--purple" id="new-badge">New</span>
              </li>
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Agents">
                  <img
                    src="./assets/icons/user.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Agents</span>
                </a>
              </li>
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Customers">
                  <img
                    src="./assets/icons/users.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Customers</span>
                </a>
              </li>
            </ul>
          </section>

          <section class="nav-section" aria-labelledby="nav-group-shop">
            <p class="nav-group__label" id="nav-group-shop">Shop</p>
            <ul class="nav-group">
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Products">
                  <img
                    src="./assets/icons/shop.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Products</span>
                </a>
              </li>
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Orders">
                  <img
                    src="./assets/icons/basket.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Orders</span>
                </a>
              </li>
              <li>
                <!-- nav link component -->
                <a href="#" class="nav-link" aria-label="Reports">
                  <img
                    src="./assets/icons/info-chat-bubble.svg"
                    alt=""
                    class="nav-link__icon"
                  />
                  <span class="nav-link__label medium">Reports</span>
                </a>
              </li>
            </ul>
          </section>
        </div>

        <section class="nav-section nav-section--footer" aria-label="Settings">
          <ul class="nav-group">
            <li>
              <!-- nav link component -->
              <a href="#" class="nav-link" aria-label="Settings">
                <img
                  src="./assets/icons/settings.svg"
                  alt=""
                  class="nav-link__icon"
                />
                <span class="nav-link__label medium">Settings</span>
              </a>
            </li>
            <li>
              <!-- nav link component -->
              <a href="#" class="nav-link" aria-label="Logout">
                <img
                  src="./assets/icons/leave.svg"
                  alt=""
                  class="nav-link__icon"
                />
                <span class="nav-link__label medium">Logout</span>
              </a>
            </li>
          </ul>
        </section>
      </nav>

      <main class="container" aria-label="Dashboard content"></main>
    </div>
  </body>
</html>
